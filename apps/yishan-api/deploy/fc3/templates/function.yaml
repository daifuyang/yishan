edition: 3.0.0
name: yishan-function
access: "enterprise"
vars:
  region: ${env(FUNCTION_REGION)}
  functionName: ${env(FUNCTION_NAME)}
  runtimeLayerArn: ${env(YISHAN_API_RUNTIME_LAYER_ARN)}
resources:
  yishan_function:
    component: fc3
    props:
      region: ${vars.region}
      description: ${env(FUNCTION_DESCRIPTION)}
      runtime: custom.debian12
      timeout: 60
      cpu: 1
      memorySize: 2048
      diskSize: 512
      instanceConcurrency: 100
      vpcConfig:
        vpcId: ${env(FUNCTION_VPC_ID)}
        vSwitchIds:
          - ${env(FUNCTION_VSWITCH_ID)}
        securityGroupId: ${env(FUNCTION_SECURITY_GROUP)}
      layers:
        - ${vars.runtimeLayerArn}
      environmentVariables:
        NODE_ENV: production
        LOG_LEVEL: ${env(LOG_LEVEL)}
        PATH: /var/fc/lang/nodejs22/bin:/usr/local/bin:/usr/local/sbin:/usr/sbin:/usr/bin:/sbin:/bin:/opt/bin:/code:/code/bin
        NODE_PATH: /code/node_modules:/opt/nodejs/node_modules
        LD_LIBRARY_PATH: /code:/code/lib:/usr/lib:/opt/lib:/usr/local/lib
        DATABASE_USER: ${env(DATABASE_USER)}
        DATABASE_PASSWORD: ${env(DATABASE_PASSWORD)}
        DATABASE_NAME: ${env(DATABASE_NAME)}
        DATABASE_HOST: ${env(DATABASE_HOST)}
        DATABASE_PORT: ${env(DATABASE_PORT)}
        JWT_SECRET: ${env(JWT_SECRET)}
        REDIS_HOST: ${env(REDIS_HOST)}
        REDIS_PORT: ${env(REDIS_PORT)}
        REDIS_PASSWORD: ${env(REDIS_PASSWORD)}
        REDIS_DB: ${env(REDIS_DB)}
        # Admin 部署形态：admin 默认编译为 /admin/ 前缀并由同站 API 提供静态资源。
        # 改为 "/" 即可让 admin 重新占用根路径（前提是 admin 也是用 PUBLIC_PATH=/ 构建）。
        ADMIN_BASE_PATH: ${env(ADMIN_BASE_PATH, '/admin/')}
        ADMIN_REDIRECT_ROOT: ${env(ADMIN_REDIRECT_ROOT, 'true')}
      customRuntimeConfig:
        command:
          - node
          - ./server.js
        port: 3000
      functionName: ${vars.functionName}
      code: ../.build/function-code
      triggers:
        - triggerName: httpTrigger
          triggerType: http
          triggerConfig:
            methods:
              - GET
              - POST
              - PUT
              - DELETE
              - PATCH
              - OPTIONS
              - HEAD
            authType: anonymous
