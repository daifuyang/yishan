edition: 3.0.0
name: yishan-migration-runner
access: "enterprise"
vars:
  region: "cn-shanghai"
  functionName: "yishan-migration-runner"
resources:
  yishan_migration_runner:
    component: fc3
    props:
      region: ${vars.region}
      description: "Temporary internal runner for Yishan database migrations"
      runtime: custom.debian12
      handler: migration-runner.handler
      timeout: 600
      cpu: 1
      memorySize: 1024
      diskSize: 512
      vpcConfig:
        vpcId: vpc-uf65806lcuh5b43szs1db
        vSwitchIds:
          - vsw-uf6fcm08qor78wfioz1c2
        securityGroupId: sg-uf6bl327dijrauls3ism
      environmentVariables:
        NODE_ENV: production
        PATH: /var/fc/lang/nodejs22/bin:/usr/local/bin:/usr/local/sbin:/usr/sbin:/usr/bin:/sbin:/bin:/opt/bin:/code:/code/bin
        NODE_PATH: /code/node_modules
        DATABASE_USER: ${env(DATABASE_USER)}
        DATABASE_PASSWORD: ${env(DATABASE_PASSWORD)}
        DATABASE_NAME: ${env(DATABASE_NAME)}
        DATABASE_HOST: 172.23.212.135
        DATABASE_PORT: ${env(DATABASE_PORT)}
      functionName: ${vars.functionName}
      # Code paths are resolved relative to this YAML file by Serverless Devs.
      code: ./.build/function-code
      customRuntimeConfig:
        command:
          - node
          - ./migration-runner-server.js
        port: 3000
