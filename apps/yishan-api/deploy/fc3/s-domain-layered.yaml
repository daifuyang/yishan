edition: 3.0.0
name: yishan-demo-layered-domain
access: "enterprise"
vars:
  region: "cn-shanghai"
  functionName: ${env(FC_FUNCTION_NAME)}
  customDomain: ${env(FC_CUSTOM_DOMAIN)}
  certName: ${env(FC_CERT_NAME)}
resources:
  yishan_demo_layered_domain:
    component: fc3-domain
    props:
      region: ${vars.region}
      domainName: ${vars.customDomain}
      protocol: HTTPS
      certConfig:
        certName: ${vars.certName}
        certificate: ${file(./certs/fullchain.cer)}
        privateKey: ${file(./certs/private.key)}
      routeConfig:
        routes:
          # 根路径用 rewrite 把 / 重写为 /admin/，再发到主函数
          # FC routeConfig 不支持 HTTP 3xx redirect，只能 path rewrite
          # 效果：用户访问 / 时看到 admin UI，浏览器 URL 仍是 /
          - path: /
            functionName: ${vars.functionName}
            methods:
              - GET
              - HEAD
            rewriteConfig:
              equalRules:
                - match: /
                  replacement: /admin/
          # 其他路径（/admin、/api、/uploads、/favicon.ico 等）保持原样路由到主函数
          - path: /*
            functionName: ${vars.functionName}
