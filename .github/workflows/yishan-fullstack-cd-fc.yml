name: yishan-fullstack-cd-fc

on:
  push:
    branches:
      - main
    paths:
      - "apps/yishan-admin/**"
      - "apps/yishan-api/**"
      - "apps/yishan-components/yishan-tiptap/**"
      - "pnpm-lock.yaml"
      - "package.json"
      - "pnpm-workspace.yaml"
  workflow_dispatch:

concurrency:
  group: yishan-fullstack-cd-fc
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    environment: YISHAN_API
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22.14.0

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@8.15.9 --activate

      - uses: actions/setup-node@v4
        with:
          node-version: 22.14.0
          cache: pnpm

      - name: Install
        run: pnpm install --no-frozen-lockfile

      - name: Prepare yishan-tiptap
        working-directory: apps/yishan-components/yishan-tiptap
        run: |
          pnpm install --filter yishan-tiptap --no-frozen-lockfile
          pnpm build --filter yishan-tiptap

      - name: Build yishan-admin
        run: pnpm --filter yishan-admin build

      - name: Sync admin dist to api public
        run: |
          rm -rf apps/yishan-api/public/admin
          mkdir -p apps/yishan-api/public/admin
          cp -R apps/yishan-admin/dist/. apps/yishan-api/public/admin/

      - name: Prepare .env
        working-directory: apps/yishan-api
        env:
          DATABASE_URL: ${{ secrets.YISHAN_API_DATABASE_URL }}
          DATABASE_USER: ${{ secrets.YISHAN_API_DATABASE_USER }}
          DATABASE_PASSWORD: ${{ secrets.YISHAN_API_DATABASE_PASSWORD }}
          DATABASE_NAME: ${{ secrets.YISHAN_API_DATABASE_NAME }}
          DATABASE_HOST: ${{ secrets.YISHAN_API_DATABASE_HOST }}
          REDIS_URL: ${{ secrets.YISHAN_API_REDIS_URL }}
        run: |
          ENV_FILE="$(pwd)/.env"
          : > "$ENV_FILE"
          printf '%s\n' "DATABASE_URL=${DATABASE_URL}" >> "$ENV_FILE"
          printf '%s\n' "DATABASE_USER=${DATABASE_USER}" >> "$ENV_FILE"
          printf '%s\n' "DATABASE_PASSWORD=${DATABASE_PASSWORD}" >> "$ENV_FILE"
          printf '%s\n' "DATABASE_NAME=${DATABASE_NAME}" >> "$ENV_FILE"
          printf '%s\n' "DATABASE_HOST=${DATABASE_HOST}" >> "$ENV_FILE"
          printf '%s\n' "REDIS_URL=${REDIS_URL}" >> "$ENV_FILE"

      - name: Install Serverless Devs
        run: npm i -g @serverless-devs/s

      - name: Configure Serverless Devs Access
        env:
          ALIBABA_CLOUD_ACCESS_KEY_ID: ${{ secrets.ALIBABA_CLOUD_ACCESS_KEY_ID }}
          ALIBABA_CLOUD_ACCESS_KEY_SECRET: ${{ secrets.ALIBABA_CLOUD_ACCESS_KEY_SECRET }}
          ALIBABA_CLOUD_ACCOUNT_ID: ${{ secrets.ALIBABA_CLOUD_ACCOUNT_ID }}
        run: |
          if [ -z "${ALIBABA_CLOUD_ACCESS_KEY_ID:-}" ]; then
            echo "Missing secret: ALIBABA_CLOUD_ACCESS_KEY_ID"
            exit 1
          fi
          if [ -z "${ALIBABA_CLOUD_ACCESS_KEY_SECRET:-}" ]; then
            echo "Missing secret: ALIBABA_CLOUD_ACCESS_KEY_SECRET"
            exit 1
          fi
          ACCOUNT_ID_CLEAN="$(echo "${ALIBABA_CLOUD_ACCOUNT_ID:-}" | tr -d '[:space:]')"
          if [ -n "${ACCOUNT_ID_CLEAN}" ] && echo "${ACCOUNT_ID_CLEAN}" | grep -Eq '^[0-9]{16,32}$'; then
            s config add \
              --AccessKeyID "$ALIBABA_CLOUD_ACCESS_KEY_ID" \
              --AccessKeySecret "$ALIBABA_CLOUD_ACCESS_KEY_SECRET" \
              --AccountID "$ACCOUNT_ID_CLEAN" \
              -a enterprise \
              -f
          else
            echo "ALIBABA_CLOUD_ACCOUNT_ID missing or invalid, try non-AccountID mode"
            s config add \
              --AccessKeyID "$ALIBABA_CLOUD_ACCESS_KEY_ID" \
              --AccessKeySecret "$ALIBABA_CLOUD_ACCESS_KEY_SECRET" \
              -a enterprise \
              -f
          fi

      - name: Build Package (pre-deploy in FC runtime image)
        working-directory: apps/yishan-api
        run: |
          docker pull return1996/runtime-custom.debian12:node22.14.0
          docker run --rm --platform linux/amd64 \
            -v "$PWD:/code" \
            -w /code \
            return1996/runtime-custom.debian12:node22.14.0 \
            bash -c "bash ./deploy/fc3/pre-deploy.sh"

      - name: Deploy
        working-directory: apps/yishan-api
        run: bash ./deploy/fc3/deploy.sh
