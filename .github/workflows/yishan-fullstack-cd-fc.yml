name: yishan-fullstack-cd-fc

on:
  push:
    branches:
      - main
    paths:
      - "apps/**"
      - "!apps/**/deploy/**"
      - "apps/yishan-api/deploy/fc3/s-function-layered.yaml"
      - "apps/yishan-api/deploy/fc3/s-domain-layered.yaml"
      - "apps/yishan-api/deploy/fc3/pre-deploy-layered.sh"
      - "apps/yishan-api/deploy/fc3/deploy-layered-function.sh"
      - "apps/yishan-api/deploy/fc3/deploy-layered-domain.sh"
      - "apps/yishan-api/deploy/fc3/build-runtime-layer.sh"
      - "apps/yishan-api/deploy/fc3/publish-runtime-layer.sh"
      - "apps/yishan-api/deploy/fc3/layer-dependencies.json"
      - "apps/yishan-api/deploy/fc3/layer-lock.example.json"
      - "apps/yishan-api/deploy/fc3/layer-state.cjs"
      - "apps/yishan-api/deploy/fc3/write-function-package.cjs"
      - "apps/yishan-api/deploy/fc3/write-layer-package.cjs"
      - "apps/yishan-api/deploy/fc3/package-version.cjs"
      - "!apps/**/docs/**"
      - "!apps/**/*.md"
      - "!apps/**/README.md"
      - "pnpm-lock.yaml"
      - "package.json"
      - "pnpm-workspace.yaml"
  workflow_dispatch:

concurrency:
  group: yishan-fullstack-cd-fc
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    environment: YISHAN_API
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22.14.0

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@8.15.9 --activate

      - uses: actions/setup-node@v4
        with:
          node-version: 22.14.0
          cache: pnpm

      - name: Install
        run: pnpm install --no-frozen-lockfile

      - name: Prepare yishan-tiptap
        working-directory: apps/yishan-components/yishan-tiptap
        run: |
          pnpm install --filter yishan-tiptap --no-frozen-lockfile
          pnpm build --filter yishan-tiptap

      - name: Build yishan-admin for FC
        run: pnpm build:admin:fc

      - name: Install qshell
        env:
          QINIU_ACCESS_KEY: ${{ secrets.QINIU_ACCESS_KEY }}
          QINIU_SECRET_KEY: ${{ secrets.QINIU_SECRET_KEY }}
          QINIU_BUCKET: ${{ secrets.QINIU_BUCKET }}
        run: |
          if [ -z "${QINIU_ACCESS_KEY:-}" ] || [ -z "${QINIU_SECRET_KEY:-}" ] || [ -z "${QINIU_BUCKET:-}" ]; then
            echo "Skip qshell install: Qiniu secrets not configured"
            exit 0
          fi
          VER='v2.19.7'
          ARCH="$(uname -m)"
          case "$ARCH" in
            x86_64) PKG='linux-amd64' ;;
            aarch64|arm64) PKG='linux-arm64' ;;
            *) echo "Unsupported arch: $ARCH"; exit 1 ;;
          esac
          TMP="$(mktemp -d)"
          curl -fL "https://github.com/qiniu/qshell/releases/download/${VER}/qshell-${VER}-${PKG}.tar.gz" -o "$TMP/qshell.tgz"
          tar -xzf "$TMP/qshell.tgz" -C "$TMP"
          sudo install -m 755 "$TMP/qshell" /usr/local/bin/qshell
          rm -rf "$TMP"
          qshell version

      - name: Upload admin dist to Qiniu bucket
        env:
          QINIU_ACCESS_KEY: ${{ secrets.QINIU_ACCESS_KEY }}
          QINIU_SECRET_KEY: ${{ secrets.QINIU_SECRET_KEY }}
          QINIU_BUCKET: ${{ secrets.QINIU_BUCKET }}
          QINIU_CDN_DOMAIN: ${{ secrets.QINIU_CDN_DOMAIN }}
        run: |
          if [ -z "${QINIU_ACCESS_KEY:-}" ] || [ -z "${QINIU_SECRET_KEY:-}" ] || [ -z "${QINIU_BUCKET:-}" ]; then
            echo "Skip upload: Qiniu secrets not configured"
            exit 0
          fi
          cat > "$HOME/.qshell.json" <<EOF
          {
            "access_key": "${QINIU_ACCESS_KEY}",
            "secret_key": "${QINIU_SECRET_KEY}",
            "use_https": true
          }
          EOF
          chmod 600 "$HOME/.qshell.json"
          qshell qupload2 \
            --src-dir apps/yishan-admin/dist \
            --bucket "${QINIU_BUCKET}" \
            --key-prefix admin/ \
            --overwrite \
            --rescan-local \
            --log-level info \
            --thread-count 4
          if [ -n "${QINIU_CDN_DOMAIN:-}" ]; then
            printf '%s\n' "https://${QINIU_CDN_DOMAIN}/admin/index.html" > /tmp/qshell_refresh_urls.txt
            qshell cdnrefresh -i /tmp/qshell_refresh_urls.txt
          fi

      - name: Prepare .env
        working-directory: apps/yishan-api
        env:
          LOG_LEVEL: info
          DATABASE_USER: ${{ secrets.YISHAN_API_DATABASE_USER }}
          DATABASE_PASSWORD: ${{ secrets.YISHAN_API_DATABASE_PASSWORD }}
          DATABASE_NAME: ${{ secrets.YISHAN_API_DATABASE_NAME }}
          DATABASE_HOST: ${{ secrets.YISHAN_API_DATABASE_HOST }}
          DATABASE_PORT: ${{ secrets.YISHAN_API_DATABASE_PORT }}
          REDIS_URL: ${{ secrets.YISHAN_API_REDIS_URL }}
        run: |
          set -euo pipefail
          ENV_FILE="$(pwd)/.env"
          node <<'NODE' > "$ENV_FILE"
          const redisUrl = process.env.REDIS_URL || '';
          let redisPort = '6379';
          let redisPassword = '';
          let redisDb = '0';
          if (redisUrl) {
            const parsed = new URL(redisUrl);
            redisPort = parsed.port || redisPort;
            redisPassword = decodeURIComponent(parsed.password || '');
            redisDb = (parsed.pathname || '/0').replace(/^\//, '') || redisDb;
          }
          const lines = [
            `LOG_LEVEL=${process.env.LOG_LEVEL || 'info'}`,
            `DATABASE_USER=${process.env.DATABASE_USER || ''}`,
            `DATABASE_PASSWORD=${process.env.DATABASE_PASSWORD || ''}`,
            `DATABASE_NAME=${process.env.DATABASE_NAME || ''}`,
            `DATABASE_HOST=${process.env.DATABASE_HOST || ''}`,
            `DATABASE_PORT=${process.env.DATABASE_PORT || '3306'}`,
            `REDIS_URL=${redisUrl}`,
            `REDIS_PORT=${redisPort}`,
            `REDIS_PASSWORD=${redisPassword}`,
            `REDIS_DB=${redisDb}`,
          ];
          process.stdout.write(lines.join('\n') + '\n');
          NODE

      - name: Install Serverless Devs
        run: npm i -g @serverless-devs/s

      - name: Configure Serverless Devs Access
        env:
          ALIBABA_CLOUD_ACCESS_KEY_ID: ${{ secrets.ALIBABA_CLOUD_ACCESS_KEY_ID }}
          ALIBABA_CLOUD_ACCESS_KEY_SECRET: ${{ secrets.ALIBABA_CLOUD_ACCESS_KEY_SECRET }}
          ALIBABA_CLOUD_ACCOUNT_ID: ${{ secrets.ALIBABA_CLOUD_ACCOUNT_ID }}
        run: |
          if [ -z "${ALIBABA_CLOUD_ACCESS_KEY_ID:-}" ]; then
            echo "Missing secret: ALIBABA_CLOUD_ACCESS_KEY_ID"
            exit 1
          fi
          if [ -z "${ALIBABA_CLOUD_ACCESS_KEY_SECRET:-}" ]; then
            echo "Missing secret: ALIBABA_CLOUD_ACCESS_KEY_SECRET"
            exit 1
          fi
          ACCOUNT_ID_CLEAN="$(echo "${ALIBABA_CLOUD_ACCOUNT_ID:-}" | tr -d '[:space:]')"
          if [ -n "${ACCOUNT_ID_CLEAN}" ] && echo "${ACCOUNT_ID_CLEAN}" | grep -Eq '^[0-9]{16,32}$'; then
            s config add \
              --AccessKeyID "$ALIBABA_CLOUD_ACCESS_KEY_ID" \
              --AccessKeySecret "$ALIBABA_CLOUD_ACCESS_KEY_SECRET" \
              --AccountID "$ACCOUNT_ID_CLEAN" \
              -a enterprise \
              -f
          else
            echo "ALIBABA_CLOUD_ACCOUNT_ID missing or invalid, try non-AccountID mode"
            s config add \
              --AccessKeyID "$ALIBABA_CLOUD_ACCESS_KEY_ID" \
              --AccessKeySecret "$ALIBABA_CLOUD_ACCESS_KEY_SECRET" \
              -a enterprise \
              -f
          fi

      - name: Restore layer lock
        uses: actions/cache@v4
        with:
          path: apps/yishan-api/deploy/fc3/layer-lock.json
          key: yishan-api-layer-lock-fallback
          restore-keys: |
            yishan-api-layer-lock-fallback

      - name: Build runtime layer
        working-directory: apps/yishan-api
        run: bash ./deploy/fc3/build-runtime-layer.sh

      - name: Publish runtime layer if needed
        id: publish_layer
        working-directory: apps/yishan-api
        env:
          YISHAN_FC_REGION: ${{ vars.YISHAN_FC_REGION || 'cn-shanghai' }}
          YISHAN_FC_LAYER_NAME: ${{ vars.YISHAN_FC_LAYER_NAME || 'yishan-api-runtime-layer' }}
          YISHAN_FC_ACCESS_ALIAS: enterprise
        run: |
          set -euo pipefail
          bash ./deploy/fc3/publish-runtime-layer.sh | tee /tmp/publish_layer.log
          # 抓取最后一行 `YISHAN_API_RUNTIME_LAYER_ARN=...`
          LAYER_ARN="$(grep -E '^YISHAN_API_RUNTIME_LAYER_ARN=' /tmp/publish_layer.log | tail -n1 | cut -d= -f2-)"
          if [ -z "$LAYER_ARN" ]; then
            echo "❌ 未能从 publish-runtime-layer.sh 输出中提取 ARN" >&2
            exit 1
          fi
          echo "layer_arn=$LAYER_ARN" >> "$GITHUB_OUTPUT"

      - name: Save layer lock
        if: always() && hashFiles('apps/yishan-api/deploy/fc3/layer-lock.json') != ''
        uses: actions/cache@v4
        with:
          path: apps/yishan-api/deploy/fc3/layer-lock.json
          key: yishan-api-layer-lock-fallback

      - name: Build Layered Package
        working-directory: apps/yishan-api
        run: bash ./deploy/fc3/pre-deploy-layered.sh

      - name: Deploy layered function
        working-directory: apps/yishan-api
        env:
          LOG_LEVEL: info
          DATABASE_USER: ${{ secrets.YISHAN_API_DATABASE_USER }}
          DATABASE_PASSWORD: ${{ secrets.YISHAN_API_DATABASE_PASSWORD }}
          DATABASE_NAME: ${{ secrets.YISHAN_API_DATABASE_NAME }}
          DATABASE_HOST: ${{ secrets.YISHAN_API_DATABASE_HOST }}
          DATABASE_PORT: ${{ secrets.YISHAN_API_DATABASE_PORT }}
          REDIS_URL: ${{ secrets.YISHAN_API_REDIS_URL }}
          YISHAN_API_RUNTIME_LAYER_ARN: ${{ steps.publish_layer.outputs.layer_arn }}
        run: |
          set -euo pipefail
          export DATABASE_PORT="${DATABASE_PORT:-3306}"
          node <<'NODE' > /tmp/yishan_layered_env.sh
          const redisUrl = process.env.REDIS_URL || '';
          let redisPort = '6379';
          let redisPassword = '';
          let redisDb = '0';
          if (redisUrl) {
            const parsed = new URL(redisUrl);
            redisPort = parsed.port || redisPort;
            redisPassword = decodeURIComponent(parsed.password || '');
            redisDb = (parsed.pathname || '/0').replace(/^\//, '') || redisDb;
          }
          const entries = {
            LOG_LEVEL: process.env.LOG_LEVEL || 'info',
            DATABASE_USER: process.env.DATABASE_USER || '',
            DATABASE_PASSWORD: process.env.DATABASE_PASSWORD || '',
            DATABASE_NAME: process.env.DATABASE_NAME || '',
            DATABASE_PORT: process.env.DATABASE_PORT || '3306',
            REDIS_PORT: redisPort,
            REDIS_PASSWORD: redisPassword,
            REDIS_DB: redisDb,
          };
          for (const [key, value] of Object.entries(entries)) {
            console.log(`export ${key}=${JSON.stringify(value)}`);
          }
          NODE
          . /tmp/yishan_layered_env.sh
          bash ./deploy/fc3/deploy-layered-function.sh
