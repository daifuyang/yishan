name: yishan-fullstack-ci

on:
  push:
    paths:
      - "apps/yishan-admin/**"
      - "apps/yishan-api/**"
      - "apps/yishan-components/yishan-tiptap/**"
      - "pnpm-lock.yaml"
      - "package.json"
      - "pnpm-workspace.yaml"
  pull_request:
    paths:
      - "apps/yishan-admin/**"
      - "apps/yishan-api/**"
      - "apps/yishan-components/yishan-tiptap/**"
      - "pnpm-lock.yaml"
      - "package.json"
      - "pnpm-workspace.yaml"

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: YISHAN_API
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22.14.0

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@8.15.9 --activate

      - uses: actions/setup-node@v4
        with:
          node-version: 22.14.0
          cache: pnpm

      - name: Install
        run: pnpm install --no-frozen-lockfile

      - name: Prepare yishan-tiptap
        working-directory: apps/yishan-components/yishan-tiptap
        run: |
          pnpm install --filter yishan-tiptap --no-frozen-lockfile
          pnpm build --filter yishan-tiptap

      - name: Admin Lint
        run: pnpm --filter yishan-admin lint

      - name: Admin Build
        run: pnpm --filter yishan-admin build

      - name: Prepare API .env
        working-directory: apps/yishan-api
        env:
          DATABASE_URL: ${{ secrets.YISHAN_API_DATABASE_URL }}
          DATABASE_USER: ${{ secrets.YISHAN_API_DATABASE_USER }}
          DATABASE_PASSWORD: ${{ secrets.YISHAN_API_DATABASE_PASSWORD }}
          DATABASE_NAME: ${{ secrets.YISHAN_API_DATABASE_NAME }}
          DATABASE_HOST: ${{ secrets.YISHAN_API_DATABASE_HOST }}
        run: |
          ENV_FILE="$(pwd)/.env"
          : > "$ENV_FILE"
          printf '%s\n' "DATABASE_URL=${DATABASE_URL}" >> "$ENV_FILE"
          printf '%s\n' "DATABASE_USER=${DATABASE_USER}" >> "$ENV_FILE"
          printf '%s\n' "DATABASE_PASSWORD=${DATABASE_PASSWORD}" >> "$ENV_FILE"
          printf '%s\n' "DATABASE_NAME=${DATABASE_NAME}" >> "$ENV_FILE"
          printf '%s\n' "DATABASE_HOST=${DATABASE_HOST}" >> "$ENV_FILE"

      - name: API Prisma Generate
        run: pnpm --filter yishan-api db:generate

      - name: API TypeScript Build
        run: pnpm --filter yishan-api build:ts

      - name: API Test
        run: pnpm --filter yishan-api test
