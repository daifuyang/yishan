name: yishan-fullstack-ci

on:
  push:
    paths:
      - ".github/workflows/**"
      - "apps/yishan-admin/**"
      - "apps/yishan-api/**"
      - "apps/yishan-components/yishan-tiptap/**"
      - "pnpm-lock.yaml"
      - "package.json"
      - "pnpm-workspace.yaml"
  pull_request:
    paths:
      - ".github/workflows/**"
      - "apps/yishan-admin/**"
      - "apps/yishan-api/**"
      - "apps/yishan-components/yishan-tiptap/**"
      - "pnpm-lock.yaml"
      - "package.json"
      - "pnpm-workspace.yaml"

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: YISHAN_API
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22.22.1

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@8.15.9 --activate

      - uses: actions/setup-node@v4
        with:
          node-version: 22.22.1
          cache: pnpm

      - name: Install
        run: pnpm install --no-frozen-lockfile --force --prod=false

      - name: Architecture Guard
        run: pnpm arch:check

      - name: Prepare yishan-tiptap
        run: |
          pnpm install --filter yishan-tiptap --no-frozen-lockfile --prod=false
          pnpm --filter yishan-tiptap build

      - name: Generate Admin plugin routes
        run: pnpm --filter yishan-admin gen:plugin-routes

      - name: Determine profile from branch
        id: profile
        run: |
          BRANCH="${GITHUB_REF_NAME:-main}"
          echo "branch=${BRANCH}" >> "$GITHUB_OUTPUT"
          case "${BRANCH}" in
            main)
              echo "profile=core" >> "$GITHUB_OUTPUT"
              ;;
            all)
              echo "profile=official" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "::error::branch '${BRANCH}' does not map to a known profile (expected main or all)"
              exit 1
              ;;
          esac

      - name: Profile validate (branch-derived)
        env:
          YISHAN_PROFILE: ${{ steps.profile.outputs.profile }}
        run: pnpm profile:validate:ci

      - name: Admin Setup
        run: pnpm --filter yishan-admin exec max setup

      - name: Admin Lint
        run: pnpm --filter yishan-admin lint

      - name: Admin Build
        run: pnpm --filter yishan-admin build

      # Admin Test 依赖 Admin Setup 生成的 .umi/ 产物；Max 不在 pretest 钩子上，
      # 必须显式依赖 setup 步骤，确保 jest 能解析 .umi/plugin-initialState 等。
      - name: Admin Test
        run: pnpm --filter yishan-admin test

      - name: Prepare API .env
        working-directory: apps/yishan-api
        env:
          DATABASE_URL: ${{ secrets.YISHAN_API_DATABASE_URL }}
          DATABASE_USER: ${{ secrets.YISHAN_API_DATABASE_USER }}
          DATABASE_PASSWORD: ${{ secrets.YISHAN_API_DATABASE_PASSWORD }}
          DATABASE_NAME: ${{ secrets.YISHAN_API_DATABASE_NAME }}
          DATABASE_HOST: ${{ secrets.YISHAN_API_DATABASE_HOST }}
        run: |
          ENV_FILE="$(pwd)/.env"
          : > "$ENV_FILE"
          printf '%s\n' "DATABASE_URL=${DATABASE_URL}" >> "$ENV_FILE"
          printf '%s\n' "DATABASE_USER=${DATABASE_USER}" >> "$ENV_FILE"
          printf '%s\n' "DATABASE_PASSWORD=${DATABASE_PASSWORD}" >> "$ENV_FILE"
          printf '%s\n' "DATABASE_NAME=${DATABASE_NAME}" >> "$ENV_FILE"
          printf '%s\n' "DATABASE_HOST=${DATABASE_HOST}" >> "$ENV_FILE"

      - name: API Schema Generate
        run: pnpm --filter yishan-api db:generate

      # 生成器自检：保证 SQL→Drizzle 生成链路每条规则都满足
      # （CREATE TABLE 数量、列名覆盖、DECIMAL scale、*Relations 导出等），
      # 避免 schema 生成回归只在生产构建时才暴露。
      - name: API Generator Self-test
        run: pnpm --filter yishan-api db:generate:test

      - name: API TypeScript Build
        run: pnpm --filter yishan-api build:ts

      - name: API Test
        run: pnpm --filter yishan-api test
